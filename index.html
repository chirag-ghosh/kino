<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
    <title>Kino</title>
    <style>
      html, body { box-sizing: border-box; margin: 0; padding: 0; height: 100%; }

      .bg-container {
        position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -1; background: #000;
      }

      .bg-layer {
        position: absolute; inset: 0; background-size: cover; background-position: center;
        opacity: 0; transform: scale(1.05);
        transition: opacity 3s ease-in-out, transform 10s linear;
      }

      .bg-layer.active { opacity: 1; transform: scale(1.15); }

      .hero { position: relative; width: 100%; min-height: 100vh; }

      .logo-container {
        z-index: 2;
        pointer-events: none;
        background-color: red;
      }

      .logo-image {
        position: fixed; left: 10vw; bottom: 8vh;
        max-height: 15vh; max-width: 40vw; object-fit: contain;
        opacity: 0; transform: scale(1.05);
        transition: opacity 3s ease-in-out, transform 10s ease-in-out;
      }

      .logo-image.active {
        opacity: 1;
        transform: scale(1);
      }
    </style>
  </head>
  <body>
    <div class="bg-container">
      <div class="bg-layer" id="bg1"></div>
      <div class="bg-layer" id="bg2"></div>
    </div>

    <div class="hero">
      <div class="logo-container">
        <img id="logo1" class="logo-image" alt="Film logo" />
        <img id="logo2" class="logo-image" alt="Film logo" />
      </div>
    </div>

    <script>
      const apiUrl = '/api/featured';
      const bg1 = document.getElementById('bg1');
      const bg2 = document.getElementById('bg2');
      const logo1 = document.getElementById('logo1');
      const logo2 = document.getElementById('logo2');
      let isBg1Active = true;
      let isFirstLoad = true;

      function setBackground(url) {
        const nextLayer = isBg1Active ? bg2 : bg1;
        const activeLayer = isBg1Active ? bg1 : bg2;
        nextLayer.style.backgroundImage = `url('${url}')`;
        nextLayer.classList.add('active');
        activeLayer.classList.remove('active');
      }

      function setLogo(url) {
        const nextLogo = isBg1Active ? logo2 : logo1;
        const activeLogo = isBg1Active ? logo1 : logo2;
        if (nextLogo.src !== url) {
          nextLogo.src = url;
          nextLogo.onload = () => {
            nextLogo.classList.add('active');
            activeLogo.classList.remove('active');
          };
        }
      }

      function updateFeatured(data) {
        if (isFirstLoad) {
          if (data?.backdrop_url) {
            bg1.style.backgroundImage = `url('${data.backdrop_url}')`;
            bg1.classList.add('active');
          }

          if (data?.logo_url) {
            logo1.src = data.logo_url;
            logo1.classList.add('active');
          }

          isFirstLoad = false;
          return;
        }

        if (data?.backdrop_url) {
          setBackground(data.backdrop_url);
        }

        if (data?.logo_url) {
          setLogo(data.logo_url);
        }

        if (data?.backdrop_url || data?.logo_url) {
          isBg1Active = !isBg1Active;
        }
      }

      function fetchFeatured() {
        fetch(apiUrl, { cache: 'no-cache' })
          .then((res) => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
          })
          .then(updateFeatured)
          .catch((err) => {
            console.warn('Unable to load featured film.', err);
          });
      }

      fetchFeatured();
      setInterval(fetchFeatured, 10000);
    </script>
  </body>
</html>
